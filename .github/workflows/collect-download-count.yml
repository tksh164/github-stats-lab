name: Collect download count

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every day at 00:00 UTC
  workflow_dispatch:     # Allows you to run this workflow manually from the Actions tab

permissions:
  contents: write

env:
  OUTPUT_DIR_PATH: statistics/downloads

jobs:
  collect-download-count:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Run PowerShell script to collect download count
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCRIPT_FILE_PATH: .github/scripts/download-count/collectdownloadcount.ps1
          TARGET_REPO_FILE_PATH: .github/scripts/download-count/collectdownloadcount-target-repos.json
        run: |
          & $env:SCRIPT_FILE_PATH -TargetRepoFilePath $env:TARGET_REPO_FILE_PATH -OutputFolderPath $env:OUTPUT_DIR_PATH

      - name: Commit and Push collected data
        env:
          COMMIT_USER_NAME: github-actions[bot]
          COMMIT_USER_EMAIL: github-actions[bot]@users.noreply.github.com
          COMMIT_MESSAGE: Update star count data
        run: |
          if [ -n "$(git status --porcelain $OUTPUT_DIR_PATH)" ]; then
            git config user.name "$COMMIT_USER_NAME"
            git config user.email "$COMMIT_USER_EMAIL"
            git add $OUTPUT_DIR_PATH
            git commit -m "$COMMIT_MESSAGE"
            git push
          else
            echo "No changes to commit."
          fi
